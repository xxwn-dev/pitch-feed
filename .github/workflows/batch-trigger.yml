name: Batch Trigger

on:
  schedule:
    - cron: '0 5 * * *' #KTC 14:00 UTC 05:00
  workflow_dispatch:  #수동 실행 가능

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger RSS Batch
        id: batch
        run: |
          curl -s --fail -X POST ${{ secrets.RENDER_APP_URL }}/api/rss/trigger \
               -H "X-Batch-Secret: ${{ secrets.RSS_SECRET }}" \
               --max-time 360 \
               -o /tmp/discord_payload.json
          echo "=== Render response ===" && cat /tmp/discord_payload.json
          if grep -q '"embeds"' /tmp/discord_payload.json; then
            echo "has_content=true" >> $GITHUB_OUTPUT
          else
            echo "has_content=false" >> $GITHUB_OUTPUT
          fi

      - name: Send Discord Notification
        if: steps.batch.outputs.has_content == 'true'
        run: |
          curl -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
               -H "Content-Type: application/json" \
               -d @/tmp/discord_payload.json
