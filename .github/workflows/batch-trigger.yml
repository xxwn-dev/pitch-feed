name: Batch Trigger

on:
  schedule:
    - cron: '0 5 * * *' #KTC 14:00 UTC 05:00
  workflow_dispatch:  #수동 실행 가능

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger RSS Batch
        id: batch
        run: |
          PAYLOAD=$(curl -s --fail -X POST ${{ secrets.RENDER_APP_URL }}/api/batch/trigger \
               -H "X-Batch-Secret: ${{ secrets.BATCH_SECRET }}" \
               --max-time 360)
          echo "payload=$PAYLOAD" >> $GITHUB_OUTPUT

      - name: Send Discord Notification
        if: ${{ steps.batch.outputs.payload != '{}' && steps.batch.outputs.payload != '' }}
        run: |
          curl -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
               -H "Content-Type: application/json" \
               -d '${{ steps.batch.outputs.payload }}'
