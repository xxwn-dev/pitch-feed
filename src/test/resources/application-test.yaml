spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/pitchfeed
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  ai:
    openai:
      api-key: test-key
      base-url: http://localhost:9999
      chat:
        options:
          model: gemini-2.5-flash

rss:
  secret: test-rss-secret
  fetch-limit: 5

naver:
  client-id: test-naver-client-id
  client-secret: test-naver-client-secret

app:
  base-url: http://localhost:8080
  react-url: http://localhost:5173

admin:
  username: testadmin
  password: testpassword

jwt:
  secret: test-jwt-secret-key-for-ci-must-be-at-least-32-chars
  expiration: 86400000
