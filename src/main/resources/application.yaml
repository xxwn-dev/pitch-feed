spring:
  application:
    name: pitch-feed

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  ai:
    openai:
      api-key: ${AI_API_KEY}
      base-url: ${AI_BASE_URL}
      chat:
        options:
          model: gemini-2.5-flash

server:
  port: 8080

rss:
  secret: ${RSS_SECRET}
  scan-limit: 20   # AI에 보낼 신규 항목 최대 수
  save-limit: 5    # 실제 저장할 최대 수

naver:
  client-id: ${NAVER_CLIENT_ID}
  client-secret: ${NAVER_CLIENT_SECRET}
  search-display: 20   # 한 번에 가져올 건수 (max 100)

app:
  base-url: ${APP_BASE_URL}
  react-url: ${REACT_URL}

admin:
  username: ${ADMIN_USERNAME}
  password: ${ADMIN_PASSWORD}

jwt:
  secret: ${JWT_SECRET}   # 최소 32자 이상 (256-bit)
  expiration: 86400000    # 24시간 (ms)
